name: Jules Issue Creator

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Trigger Jules AI Audit
        env:
          JULES_API_KEY: ${{ secrets.JULES_API_KEY }}
        run: |
          if [ -z "$JULES_API_KEY" ]; then
            echo "::error::JULES_API_KEY secret is missing."
            exit 1
          fi

          # Using Here-Doc to manage the detailed multi-line prompt and JSON payload
          curl -X POST "https://jules.googleapis.com/v1alpha/sessions" \
            -H "X-Goog-Api-Key: $JULES_API_KEY" \
            -H "Content-Type: application/json" \
            -d @- <<EOF
          {
            "prompt": "You are the Automated Quality & Security Auditor for InsightAI. Your sole objective is to audit code changes and autonomously generate high-quality GitHub issues.\n\nAnalyze the current diff and repo context. You must identify and report issues across these FIVE categories:\n\n1. BUG: Logic errors, runtime crashes, and functional defects.\n2. SECURITY: Vulnerabilities, SQL injection, insecure SSH/SSL, or secret leakage.\n3. ENHANCEMENT: Performance bottlenecks, UI/UX polish (Glassmorphism), and usability.\n4. TECH-DEBT: Code duplication, missing types, and refactoring opportunities.\n5. DOCUMENTATION: Outdated comments, README gaps, or API documentation needs.\n\nFor EACH individual issue found, create a separate GitHub issue using this EXACT structure:\n\nTITLE: [<Category>] <Short, descriptive title>\nBODY:\n### 🏗️ Category\n<Category Name>\n\n### 📝 Problem Description\n<Technical explanation of the deficiency.>\n\n### 📉 Impact\n<Consequences for codebase health, security, or the end-user.>\n\n### 🛠️ Proposed Solution\n<Code-level recommendation or step-by-step fix guide.>\n\n### 📍 Location\n- File: <path>\n- Lines: <range>\n\nLABELS: bug, security, enhancement, documentation",
            "sourceContext": {
              "source": "sources/github/danishali778/InsightAI",
              "githubRepoContext": {
                "startingBranch": "main"
              }
            },
            "title": "Production Hardening Audit"
          }
          EOF
